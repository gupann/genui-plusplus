<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .tab-active {
      color: #111;
      font-weight: 700;
      border-bottom: 2.5px solid #cc0000;
    }
    .tab-inactive {
      color: #888;
      font-weight: 400;
      border-bottom: 2.5px solid transparent;
    }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200" style="background:#f2f2f2;">

  <!-- Red top header bar -->
  <div class="flex items-center gap-2 px-3 py-2" style="background:#cc0000;">
    <!-- US flag circle avatar with location pin -->
    <div class="relative flex-shrink-0">
      <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white">
        <!-- US flag emoji as stand-in -->
        <div class="w-full h-full flex items-center justify-center text-2xl" style="background:#cc0000;">
          🇺🇸
        </div>
      </div>
      <!-- Location pin dot -->
      <div class="absolute -bottom-0.5 -right-0.5 w-4 h-4 rounded-full bg-white flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="#cc0000">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
      </div>
    </div>

    <!-- Search bar -->
    <div class="flex-1 bg-white rounded-full flex items-center px-3 py-2 gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="text-gray-400 text-sm">Search</span>
    </div>

    <!-- Download / save icon -->
    <button class="w-9 h-9 rounded-full border-2 border-white flex items-center justify-center flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
    </button>
  </div>

  <!-- Category tabs -->
  <div class="flex bg-white border-b border-gray-200 overflow-x-auto" style="scrollbar-width:none;">
    <button class="tab-inactive px-4 py-3 text-sm whitespace-nowrap">Following</button>
    <button class="tab-active px-4 py-3 text-sm whitespace-nowrap">For you</button>
    <div class="relative">
      <button class="tab-inactive px-4 py-3 text-sm whitespace-nowrap">Local</button>
      <!-- blue notification dot -->
      <span class="absolute top-2 right-1 w-2 h-2 rounded-full bg-blue-500"></span>
    </div>
    <button class="tab-inactive px-4 py-3 text-sm whitespace-nowrap">Politics</button>
    <button class="tab-inactive px-4 py-3 text-sm whitespace-nowrap">Faith</button>
    <button class="tab-inactive px-4 py-3 text-sm whitespace-nowrap text-gray-300">Sp</button>
    <!-- Filter / sliders icon -->
    <button class="px-3 py-3 ml-auto flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="#666" stroke-width="1.8">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="8" cy="6" r="2" fill="white" stroke="#666"/>
        <circle cx="16" cy="12" r="2" fill="white" stroke="#666"/>
        <circle cx="10" cy="18" r="2" fill="white" stroke="#666"/>
      </svg>
    </button>
  </div>

  <!-- "Choose Your City" row -->
  <div class="flex items-center justify-between bg-white px-4 py-3 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <!-- City / building icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="#5b9bd5">
        <path d="M15 11V5l-3-3-3 3v2H3v14h18V11h-6zm-8 8H5v-2h2v2zm0-4H5v-2h2v2zm0-4H5v-2h2v2zm6 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2zm6 12h-2v-2h2v2zm0-4h-2v-2h2v2z"/>
      </svg>
      <span class="font-bold text-base text-gray-900">Choose Your City</span>
      <!-- Edit/pencil icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="#5b9bd5" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a4 4 0 01-1.414.879l-3.414.707.707-3.414A4 4 0 019 13z"/>
      </svg>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-gray-400 text-sm">Headline &amp; Weather</span>
      <!-- Three-dot menu -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="#bbb">
        <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
      </svg>
    </div>
  </div>

  <!-- Empty content area (gray, matches screenshot) -->
  <div class="flex-1" style="background:#f0f0f0; min-height: 400px;"></div>

  <!-- Bottom navigation -->
  <div class="bg-white border-t border-gray-200">
    <div class="grid grid-cols-4 py-2">

      <!-- Home (active) -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <div class="w-8 h-8 rounded flex items-center justify-center" style="background:#cc0000;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="white">
            <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
          </svg>
        </div>
        <span class="text-xs font-semibold" style="color:#cc0000;">Home</span>
      </button>

      <!-- Video -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.6">
          <rect x="2" y="7" width="15" height="11" rx="1"/>
          <!-- TV antenna -->
          <line x1="7" y1="7" x2="5" y2="3"/>
          <line x1="12" y1="7" x2="14" y2="3"/>
          <!-- heart-rate style line inside screen -->
          <polyline points="5 12 7 10 9 14 11 11 13 12" stroke="#777" stroke-width="1.4"/>
          <path d="M17 9l4-2v10l-4-2V9z" fill="#777"/>
        </svg>
        <span class="text-xs text-gray-500">Video</span>
      </button>

      <!-- Inbox -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="#777" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <span class="text-xs text-gray-500">Inbox</span>
      </button>

      <!-- Me (with blue dot) -->
      <button class="flex flex-col items-center gap-1 pt-1 relative">
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="#777" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <!-- blue notification dot -->
          <span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-blue-500 border border-white"></span>
        </div>
        <span class="text-xs text-gray-500">Me</span>
      </button>

    </div>
  </div>

</div>

</body>
</html>
