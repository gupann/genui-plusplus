<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time to crush it.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: #ddd; }
    .dot.active { background: #e8421a; width: 24px; }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col bg-white overflow-x-hidden max-w-md mx-auto border-x border-slate-200">

  <!-- Top spacer -->
  <div class="h-8"></div>

  <!-- Hero tagline -->
  <div class="px-6 pt-4 pb-6 text-center">
    <h1 class="text-4xl font-light" style="color:#e8421a; font-family: Georgia, serif; letter-spacing: -0.5px;">
      Time to crush it.
    </h1>
  </div>

  <!-- Deals card / carousel -->
  <div class="mx-4">
    <div class="rounded-2xl overflow-hidden relative" style="background:#fde8e0;">
      <!-- "Deals near you" label -->
      <div class="px-5 pt-4 pb-2 flex items-center gap-1">
        <span class="text-lg font-medium" style="color:#e8421a;">Deals near you</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="#e8421a" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>

      <!-- Fitness photo: man and woman doing battle ropes workout at gym -->
      <img
        src="https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg?auto=compress&cs=tinysrgb&w=600&h=300&fit=crop"
        alt="Man and woman working out at a gym"
        class="w-full object-cover"
        style="height: 300px; object-position: center;"
        onerror="this.onerror=null;this.src='https://placehold.co/600x300/fde8e0/e8421a?text=Deals+Near+You';"
      />
    </div>
  </div>

  <!-- Carousel dots -->
  <div class="flex items-center justify-center gap-2 mt-4">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- "Try something new" section -->
  <div class="px-5 mt-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-1">Try something new</h2>
    <div class="mt-1" style="height:3px; width:72px; background:#e8421a; border-radius:2px;"></div>
  </div>

  <!-- Spacer to push nav to bottom -->
  <div class="flex-1"></div>

  <!-- Bottom navigation bar -->
  <div class="border-t border-gray-200 bg-white">
    <div class="grid grid-cols-5 py-2">

      <!-- Home (active) -->
      <button class="flex flex-col items-center gap-1 pt-1 pb-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#e8421a">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="text-xs font-bold tracking-wide" style="color:#e8421a;">HOME</span>
      </button>

      <!-- Search -->
      <button class="flex flex-col items-center gap-1 pt-1 pb-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#888" stroke-width="1.8">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="text-xs tracking-wide text-gray-500">SEARCH</span>
      </button>

      <!-- Favorites -->
      <button class="flex flex-col items-center gap-1 pt-1 pb-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#888" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <span class="text-xs tracking-wide text-gray-500">FAVORITES</span>
      </button>

      <!-- Deals -->
      <button class="flex flex-col items-center gap-1 pt-1 pb-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#888" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
        </svg>
        <span class="text-xs tracking-wide text-gray-500">DEALS</span>
      </button>

      <!-- Profile -->
      <button class="flex flex-col items-center gap-1 pt-1 pb-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#888" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs tracking-wide text-gray-500">PROFILE</span>
      </button>

    </div>
  </div>

</div>

</body>
</html>
