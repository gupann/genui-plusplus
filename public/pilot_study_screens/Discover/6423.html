<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Woot! Daily Deals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #aaa; display: inline-block; }
    .dot.active { background: #1a73e8; }
    .price sup { font-size: 0.55em; vertical-align: super; line-height: 0; font-weight: 700; }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col bg-white overflow-x-hidden max-w-md mx-auto border-x border-slate-200">

  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-2 bg-white border-b border-gray-100">
    <!-- Woot logo text area -->
    <div class="flex items-center gap-2">
      <!-- Woot mascot: a fun monkey-like character represented as emoji/icon placeholder -->
      <div class="w-14 h-14 flex items-center justify-center text-4xl select-none" style="margin-left:-4px;">
        🐒
      </div>
      <div class="flex flex-col leading-tight">
        <span class="font-extrabold text-3xl" style="color:#2ea84c; line-height:1;">woot!</span>
        <span class="text-xs text-gray-500" style="line-height:1.2;">an <span class="font-bold" style="color:#f90;">amazon</span> company</span>
      </div>
    </div>
    <!-- Cart icon -->
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
      </svg>
    </button>
  </div>

  <!-- Prime banner -->
  <div class="w-full py-2 text-center text-white text-sm font-semibold tracking-wide" style="background:#232f3e;">
    PRIME MEMBERS | Free shipping
  </div>

  <!-- Hero banner: Prime Exclusive Store -->
  <div class="w-full relative overflow-hidden" style="background:#1a91f0; min-height: 220px;">
    <div class="flex items-center justify-between px-4 py-6 h-full">
      <!-- Amazon boxes illustration — using a free image of stacked boxes -->
      <div class="w-44 flex-shrink-0">
        <img
          src="https://images.pexels.com/photos/4246120/pexels-photo-4246120.jpeg?auto=compress&cs=tinysrgb&w=300&h=220&fit=crop"
          alt="Stacked cardboard boxes"
          class="w-full h-44 object-cover rounded-lg opacity-90"
          onerror="this.onerror=null;this.style.display='none';"
        />
      </div>
      <!-- Text -->
      <div class="flex-1 pl-4">
        <div class="inline-flex items-center gap-1 px-2 py-0.5 rounded mb-2" style="background:#232f3e;">
          <span class="text-xs font-bold" style="color:#f90;">PRIME</span>
          <span class="text-white text-xs font-semibold">Exclusive Store</span>
        </div>
        <p class="text-white font-bold text-xl leading-snug">Discounts just for<br>Prime Members</p>
      </div>
    </div>
    <!-- Dots -->
    <div class="flex justify-center gap-2 pb-3">
      <span class="dot"></span>
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- Daily Deals section -->
  <div class="px-4 pt-5 pb-2">
    <h2 class="text-2xl font-bold" style="color:#2ea84c;">Daily Deals</h2>
    <p class="text-gray-800 text-sm mt-0.5">Our deepest discounts, one day only.</p>
  </div>

  <!-- Product grid -->
  <div class="px-4 pb-6 grid grid-cols-2 gap-3">

    <!-- Product 1: Sunglasses -->
    <div class="flex flex-col">
      <div class="bg-gray-100 rounded overflow-hidden" style="height:190px;">
        <img
          src="https://images.pexels.com/photos/2371968/pexels-photo-2371968.jpeg?auto=compress&cs=tinysrgb&w=300&h=190&fit=crop"
          alt="Assorted sunglasses"
          class="w-full h-full object-cover"
          onerror="this.onerror=null;this.src='https://placehold.co/300x190/f3f4f6/555?text=Sunglasses';"
        />
      </div>
      <p class="price text-gray-900 font-bold text-base mt-2">
        $<sup>39</sup>99 – $<sup>123</sup>99
      </p>
    </div>

    <!-- Product 2: Graphic T-shirt -->
    <div class="flex flex-col">
      <div class="bg-gray-100 rounded overflow-hidden" style="height:190px;">
        <img
          src="https://images.pexels.com/photos/996329/pexels-photo-996329.jpeg?auto=compress&cs=tinysrgb&w=300&h=190&fit=crop"
          alt="Gray graphic t-shirt"
          class="w-full h-full object-cover"
          onerror="this.onerror=null;this.src='https://placehold.co/300x190/f3f4f6/555?text=Graphic+Tee';"
        />
      </div>
      <p class="price text-gray-900 font-bold text-base mt-2">
        $<sup>15</sup>00
      </p>
    </div>

  </div>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Bottom nav bar -->
  <div class="border-t border-gray-200 bg-white" style="background:#1a1a2e;">
    <div class="grid grid-cols-5 py-2">

      <!-- Home (active) -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#f5a623">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="text-xs font-semibold" style="color:#f5a623;">Home</span>
      </button>

      <!-- Categories -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.6">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span class="text-xs text-gray-400">Categories</span>
      </button>

      <!-- Forums -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <span class="text-xs text-gray-400">Forums</span>
      </button>

      <!-- Account -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs text-gray-400">Account</span>
      </button>

      <!-- More -->
      <button class="flex flex-col items-center gap-1 pt-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#aaa">
          <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
        </svg>
        <span class="text-xs text-gray-400">More</span>
      </button>

    </div>
  </div>

</div>

</body>
</html>
