<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Front Page – Reddit</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #e0e0e0; margin: 0; }

  /* ── Toolbar ── */
  .toolbar {
    background: #6b84a8;
    display: flex;
    align-items: center;
    padding: 0 12px;
    height: 58px;
    flex-shrink: 0;
    position: sticky; top: 0; z-index: 20;
    gap: 4px;
  }
  .tb-btn {
    background: none; border: none; cursor: pointer;
    padding: 8px; color: #fff; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tb-title-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    padding-left: 4px;
  }
  .tb-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .tb-title-chevron { color: #dde4ee; }
  .tb-icons { display: flex; gap: 0; }

  /* ── Sort bar ── */
  .sort-bar {
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid #d8d8d8;
  }
  .sort-label { font-size: 14px; color: #666; font-weight: 500; }
  .sort-icon { color: #888; }

  /* ── Post card ── */
  .post-card {
    background: #fff;
    border-top: 1px solid #e8e8e8;
    border-bottom: 1px solid #e8e8e8;
    margin-bottom: 8px;
  }
  .post-body { padding: 14px 14px 10px; }

  .post-title {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    line-height: 1.4;
    margin-bottom: 7px;
  }
  .post-meta {
    font-size: 12px;
    color: #777;
    line-height: 1.6;
    margin-bottom: 5px;
  }
  .post-meta-link { color: #5f99cf; }

  .award-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 0;
  }
  /* award coin icon */
  .award-icon {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  .award-text { font-size: 12px; color: #888; }

  /* ── Vote / action bar ── */
  .action-bar {
    background: #6b84a8;
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 0;
  }
  .vote-box {
    border: 1.5px solid #fff;
    border-radius: 4px;
    padding: 5px 16px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    margin-right: auto;
    cursor: pointer;
    background: none;
    min-width: 60px;
    text-align: center;
  }
  .action-btn {
    background: none; border: none; cursor: pointer;
    padding: 8px 10px; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Post image ── */
  .post-image {
    width: 100%;
    display: block;
    max-height: 340px;
    object-fit: cover;
    object-position: top;
    background: #ccc;
  }

  /* emoji/flair chip */
  .flair-chip {
    display: inline-block;
    background: #d6e4f0;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
    color: #4a7fa5;
    font-weight: 600;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200"
     style="background:#ebebeb;">

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <!-- Hamburger -->
    <button class="tb-btn" aria-label="Menu">
      <svg width="22" height="18" viewBox="0 0 22 18" fill="none">
        <rect y="0"  width="22" height="2.8" rx="1.4" fill="#fff"/>
        <rect y="7.5" width="22" height="2.8" rx="1.4" fill="#fff"/>
        <rect y="15" width="22" height="2.8" rx="1.4" fill="#fff"/>
      </svg>
    </button>

    <!-- Title -->
    <div class="tb-title-wrap">
      <span class="tb-title">Front Page</span>
      <svg class="tb-title-chevron" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <!-- Right icons -->
    <div class="tb-icons">
      <!-- Search -->
      <button class="tb-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <!-- Refresh -->
      <button class="tb-btn" aria-label="Refresh">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <!-- More options -->
      <button class="tb-btn" aria-label="More options">
        <svg width="5" height="20" viewBox="0 0 5 22" fill="#fff">
          <circle cx="2.5" cy="2.5"  r="2.5"/>
          <circle cx="2.5" cy="11"   r="2.5"/>
          <circle cx="2.5" cy="19.5" r="2.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Sort bar ── -->
  <div class="sort-bar">
    <span class="sort-label">Best</span>
    <svg class="sort-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="21" y1="6"  x2="3"  y2="6"/>
      <line x1="15" y1="12" x2="3"  y2="12"/>
      <line x1="9"  y1="18" x2="3"  y2="18"/>
    </svg>
  </div>

  <!-- ════════════════════════════
       POST 1 — text post (AskReddit)
  ════════════════════════════ -->
  <div class="post-card">
    <div class="post-body">
      <div class="post-title">
        What item do you add to a grilled cheese sandwich that makes it awesome?
      </div>
      <div class="post-meta">
        to <span class="post-meta-link">r/AskReddit</span> by AnotherFrankHere &nbsp;(self.AskReddit)<br/>
        5 hours ago<br/>
        4043 comments
      </div>
      <div class="award-row">
        <!-- award coin SVG -->
        <span class="award-icon">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="11" fill="#e8a020"/>
            <circle cx="12" cy="12" r="8"  fill="#f0c040"/>
            <text x="12" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#a06010">★</text>
          </svg>
        </span>
        <span class="award-text">(1 award)</span>
      </div>
    </div>

    <!-- action bar -->
    <div class="action-bar">
      <button class="vote-box">2238</button>
      <!-- share -->
      <button class="action-btn" aria-label="Share">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <!-- copy -->
      <button class="action-btn" aria-label="Copy">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <!-- profile -->
      <button class="action-btn" aria-label="Profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <!-- more -->
      <button class="action-btn" aria-label="More">
        <svg width="5" height="20" viewBox="0 0 5 22" fill="#fff">
          <circle cx="2.5" cy="2.5"  r="2.5"/>
          <circle cx="2.5" cy="11"   r="2.5"/>
          <circle cx="2.5" cy="19.5" r="2.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════
       POST 2 — video/image post (MadeMeSmile)
       Image: two people reacting — "insane transformation" theme
       Using a free Unsplash/Pexels reaction/surprise photo
  ════════════════════════════ -->
  <div class="post-card">
    <div class="post-body">
      <div class="post-title">
        <span class="flair-chip">❤️ Whole...</span>
        Insane transformation
      </div>
      <div class="post-meta">
        to <span class="post-meta-link">r/MadeMeSmile</span> by King_Pee &nbsp;(v.redd.it)<br/>
        3 hours ago<br/>
        484 comments
      </div>
      <div class="award-row">
        <span class="award-icon">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="11" fill="#e8a020"/>
            <circle cx="12" cy="12" r="8"  fill="#f0c040"/>
            <text x="12" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#a06010">★</text>
          </svg>
        </span>
        <span class="award-text">(1 award)</span>
      </div>
    </div>

    <!--
      Inline SVG: two people side-by-side reacting with surprise/amazement
      (open mouths, wide eyes), matching the "insane transformation" viral
      video thumbnail style. Dark background like the screenshot frame.
      Zero external dependencies.
    -->
    <svg width="100%" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg"
         style="display:block;background:#1a1e2a;">

      <!-- ── Dark blurred background suggestion ── -->
      <rect width="400" height="280" fill="#1a1e2a"/>
      <!-- subtle vertical light from a window/screen behind -->
      <rect x="40" y="0" width="60" height="280" fill="#2a3248" opacity="0.6" rx="2"/>
      <rect x="290" y="0" width="70" height="280" fill="#243060" opacity="0.4" rx="2"/>

      <!-- ══════════════════════
           PERSON 1 (left) — woman, surprised open mouth, dark hair
      ══════════════════════ -->
      <!-- neck -->
      <rect x="118" y="168" width="24" height="30" rx="4" fill="#c9967a"/>
      <!-- shoulders / torso -->
      <ellipse cx="130" cy="230" rx="55" ry="55" fill="#5a4a3a"/>
      <!-- head -->
      <ellipse cx="130" cy="148" rx="42" ry="48" fill="#c9967a"/>
      <!-- hair — dark, pulled back loosely -->
      <ellipse cx="130" cy="118" rx="42" ry="22" fill="#2a1a10"/>
      <path d="M88 140 Q82 180 90 220" stroke="#2a1a10" stroke-width="14"
            fill="none" stroke-linecap="round"/>
      <path d="M172 140 Q178 165 170 200" stroke="#2a1a10" stroke-width="10"
            fill="none" stroke-linecap="round"/>
      <!-- left ear -->
      <ellipse cx="88"  cy="150" rx="7" ry="9" fill="#ba8870"/>
      <!-- right ear -->
      <ellipse cx="172" cy="150" rx="7" ry="9" fill="#ba8870"/>

      <!-- eyes — wide open (surprised) -->
      <!-- left eye -->
      <ellipse cx="114" cy="143" rx="11" ry="13" fill="#fff"/>
      <ellipse cx="114" cy="145" rx="7"  ry="8"  fill="#3a2010"/>
      <ellipse cx="114" cy="145" rx="4"  ry="4"  fill="#1a0a08"/>
      <circle  cx="117" cy="142" r="2.5" fill="#fff"/>
      <!-- right eye -->
      <ellipse cx="148" cy="143" rx="11" ry="13" fill="#fff"/>
      <ellipse cx="148" cy="145" rx="7"  ry="8"  fill="#3a2010"/>
      <ellipse cx="148" cy="145" rx="4"  ry="4"  fill="#1a0a08"/>
      <circle  cx="151" cy="142" r="2.5" fill="#fff"/>

      <!-- eyebrows — raised high (surprise) -->
      <path d="M103 126 Q114 120 125 126" stroke="#2a1a10" stroke-width="3.5"
            fill="none" stroke-linecap="round"/>
      <path d="M137 126 Q148 120 159 126" stroke="#2a1a10" stroke-width="3.5"
            fill="none" stroke-linecap="round"/>

      <!-- nose -->
      <path d="M127 152 Q123 162 128 166 Q133 168 138 166 Q143 162 137 152"
            stroke="#ba8870" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- mouth — open O (shock/amazement) -->
      <ellipse cx="131" cy="178" rx="14" ry="11" fill="#3a1010"/>
      <ellipse cx="131" cy="177" rx="13" ry="9"  fill="#5a1818"/>
      <!-- teeth top -->
      <rect x="120" y="170" width="22" height="6" rx="3" fill="#f0ece8"/>
      <!-- teeth bottom -->
      <rect x="121" y="182" width="20" height="5" rx="3" fill="#e0dcd8"/>

      <!-- ══════════════════════
           PERSON 2 (right) — man, blue shirt, surprised expression
      ══════════════════════ -->
      <!-- neck -->
      <rect x="258" y="162" width="24" height="32" rx="4" fill="#d4a882"/>
      <!-- shoulders / torso — blue t-shirt -->
      <ellipse cx="270" cy="235" rx="60" ry="55" fill="#2a72b8"/>
      <!-- head -->
      <ellipse cx="270" cy="140" rx="44" ry="50" fill="#d4a882"/>
      <!-- hair — short, light brown -->
      <ellipse cx="270" cy="108" rx="44" ry="20" fill="#8a6040"/>
      <path d="M226 130 Q222 108 230 100 Q244 92 270 90 Q296 92 310 100 Q318 108 314 130"
            fill="#8a6040"/>

      <!-- left ear -->
      <ellipse cx="226" cy="145" rx="7" ry="9" fill="#c49870"/>
      <!-- right ear -->
      <ellipse cx="314" cy="145" rx="7" ry="9" fill="#c49870"/>

      <!-- eyes — wide open -->
      <!-- left eye -->
      <ellipse cx="254" cy="138" rx="12" ry="13" fill="#fff"/>
      <ellipse cx="254" cy="140" rx="7.5" ry="8" fill="#4a3020"/>
      <ellipse cx="254" cy="140" rx="4"   ry="4" fill="#1a0a04"/>
      <circle  cx="257" cy="137" r="2.5"  fill="#fff"/>
      <!-- right eye -->
      <ellipse cx="288" cy="138" rx="12" ry="13" fill="#fff"/>
      <ellipse cx="288" cy="140" rx="7.5" ry="8" fill="#4a3020"/>
      <ellipse cx="288" cy="140" rx="4"   ry="4" fill="#1a0a04"/>
      <circle  cx="291" cy="137" r="2.5"  fill="#fff"/>

      <!-- eyebrows — raised -->
      <path d="M242 120 Q254 113 266 120" stroke="#6a4020" stroke-width="3.5"
            fill="none" stroke-linecap="round"/>
      <path d="M276 120 Q288 113 300 120" stroke="#6a4020" stroke-width="3.5"
            fill="none" stroke-linecap="round"/>

      <!-- nose -->
      <path d="M267 148 Q263 159 268 163 Q272 165 278 163 Q283 159 277 148"
            stroke="#c49870" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- mouth — slight open drop (processing surprise) -->
      <path d="M256 172 Q270 182 284 172" stroke="#b07858" stroke-width="2.5"
            fill="none" stroke-linecap="round"/>
      <ellipse cx="270" cy="177" rx="10" ry="6" fill="#4a1a10"/>
      <rect x="261" y="172" width="18" height="4" rx="2" fill="#e8e0d8"/>

      <!-- ── Video play overlay hint ── -->
      <circle cx="200" cy="240" r="18" fill="rgba(0,0,0,0.45)"/>
      <polygon points="194,232 194,248 212,240" fill="#fff" opacity="0.9"/>

      <!-- ── Subtle "before / after" text watermark ── -->
      <text x="20" y="270" font-size="11" fill="rgba(255,255,255,0.35)"
            font-family="Arial,sans-serif">Insane Transformation</text>
    </svg>

    <!-- action bar -->
    <div class="action-bar">
      <button class="vote-box">20478</button>
      <button class="action-btn" aria-label="Share">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <button class="action-btn" aria-label="Copy">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="action-btn" aria-label="Profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <button class="action-btn" aria-label="More">
        <svg width="5" height="20" viewBox="0 0 5 22" fill="#fff">
          <circle cx="2.5" cy="2.5"  r="2.5"/>
          <circle cx="2.5" cy="11"   r="2.5"/>
          <circle cx="2.5" cy="19.5" r="2.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- bottom spacer to allow scroll -->
  <div style="height:40px; background:#ebebeb;"></div>

</div>
</body>
</html>
