<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forest Sound</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Custom pink/red range slider */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #e91e8c 0%, #e91e8c 38%, #ccc 38%, #ccc 100%);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e91e8c;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e91e8c;
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200" style="background:#f5f5f5;">

  <!-- App header bar -->
  <div class="px-4 py-4" style="background:#3f51b5;">
    <h1 class="text-white text-xl font-semibold">Forest Sound</h1>
  </div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col items-center px-6 pt-8 pb-6">

    <!-- Forest image -->
    <div class="mb-10">
      <img
        src="https://images.pexels.com/photos/1757363/pexels-photo-1757363.jpeg?auto=compress&cs=tinysrgb&w=340&h=340&fit=crop"
        alt="Sunlit forest with tall trees"
        class="rounded"
        style="width: 240px; height: 220px; object-fit: cover; object-position: center;"
        onerror="this.onerror=null;this.src='https://placehold.co/240x220/1a4a1a/ffffff?text=Forest';"
      />
    </div>

    <!-- Controls row: pause button + timer -->
    <div class="flex items-center justify-center gap-12 mb-12">

      <!-- Pause button circle -->
      <div class="w-28 h-28 rounded-full border-2 border-gray-900 flex items-center justify-center">
        <!-- Two vertical bars (pause icon) -->
        <div class="flex gap-3">
          <div class="w-5 h-10 bg-gray-900 rounded-sm"></div>
          <div class="w-5 h-10 bg-gray-900 rounded-sm"></div>
        </div>
      </div>

      <!-- Timer circle -->
      <div class="w-28 h-28 rounded-full border-2 border-gray-400 flex items-center justify-center">
        <span class="text-xl font-medium text-gray-400" style="letter-spacing: 0.05em;">00:00:57</span>
      </div>

    </div>

    <!-- Volume section -->
    <div class="w-full">
      <p class="text-center font-bold text-gray-800 text-base mb-4 tracking-widest">VOLUME</p>
      <div class="flex items-center gap-3">
        <span class="font-bold text-gray-800 text-sm w-10 flex-shrink-0">LOW</span>
        <input
          type="range"
          min="0"
          max="100"
          value="38"
          class="flex-1"
        />
        <span class="font-bold text-gray-800 text-sm w-10 flex-shrink-0 text-right">HIGH</span>
      </div>
    </div>

  </div>

</div>

</body>
</html>
