<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Radar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .google-logo span { font-weight: 700; }
    .g-blue  { color: #4285F4; }
    .g-red   { color: #EA4335; }
    .g-yellow{ color: #FBBC05; }
    .g-green { color: #34A853; }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200" style="background:#f0eeea;">

  <!-- Map area (fills most of screen) -->
  <div class="relative flex-1" style="min-height: 580px;">

    <!-- Aerial city road map image as background -->
    <img
      src="https://images.pexels.com/photos/13872667/pexels-photo-13872667.jpeg?auto=compress&cs=tinysrgb&w=480&h=620&fit=crop"
      alt="Aerial view of city roads"
      class="absolute inset-0 w-full h-full object-cover"
      onerror="this.onerror=null;this.src='https://placehold.co/480x620/e8f0e8/666?text=Map';"
    />

    <!-- Top nav bar overlay (semi-transparent white) -->
    <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-3 py-3" style="background:rgba(255,255,255,0.92);">
      <button class="p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="#555" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <span class="text-gray-800 text-lg font-normal">Live Radar</span>
      <button class="p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#555" stroke-width="1.8">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- Blue notification card -->
    <div class="absolute left-3 right-3" style="top: 68px; border-radius: 18px; overflow:hidden;">
      <div style="background: linear-gradient(135deg, #4fc3f7 0%, #1976d2 100%); padding: 22px 20px 22px 20px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.18);">
        <p class="text-white font-bold text-xl leading-snug">No speed camera in front of you</p>
      </div>
    </div>

    <!-- Map pins (SVG overlaid) -->
    <!-- Green walking pin -->
    <div class="absolute" style="left: 36%; top: 36%;">
      <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background:#388e3c;">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="white">
          <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
        </svg>
      </div>
    </div>

    <!-- Gray camera/radar pin near center -->
    <div class="absolute" style="left: 48%; top: 40%;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="#757575">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>
    <!-- Blue location dot -->
    <div class="absolute" style="left: 47%; top: 46%;">
      <div class="w-5 h-5 rounded-full border-2 border-white" style="background:#1565c0; box-shadow: 0 0 0 4px rgba(21,101,192,0.2);"></div>
    </div>

    <!-- Another gray pin lower -->
    <div class="absolute" style="left: 60%; top: 58%;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#757575">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>

    <!-- Another gray pin lower-left -->
    <div class="absolute" style="left: 54%; top: 72%;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#757575">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>

    <!-- Teal location pin (bottom-left area) -->
    <div class="absolute" style="left: 22%; top: 80%;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#00897b">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>

    <!-- Orange food pin -->
    <div class="absolute" style="right: 12%; top: 70%;">
      <div class="w-7 h-7 rounded-full flex items-center justify-center" style="background:#f57c00;">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="white">
          <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
        </svg>
      </div>
    </div>

    <!-- Museum teal pin -->
    <div class="absolute" style="right: 14%; top: 80%;">
      <div class="w-7 h-7 rounded-full flex items-center justify-center" style="background:#0097a7;">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="white">
          <path d="M22 11V9L12 2 2 9v2h2v9H2v2h20v-2h-2v-9h2zm-7 9h-2v-4h-2v4H9v-8h6v8z"/>
        </svg>
      </div>
    </div>

    <!-- Map labels -->
    <div class="absolute text-xs text-gray-700 font-medium" style="left: 54%; top: 73%; white-space:nowrap; font-size: 10px;">Computer<br>History Museum</div>

    <!-- Speed indicator (bottom-left circle) -->
    <div class="absolute bottom-4 left-4">
      <div class="w-20 h-20 rounded-full flex flex-col items-center justify-center" style="background:linear-gradient(135deg, #4fc3f7, #1565c0); box-shadow: 0 3px 12px rgba(0,0,0,0.3);">
        <span class="text-white font-bold text-2xl leading-none">0</span>
        <span class="text-white text-xs">km/h</span>
      </div>
    </div>

    <!-- My location button (bottom-right) -->
    <div class="absolute bottom-4 right-4">
      <div class="w-10 h-10 rounded bg-white shadow flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#555">
          <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
        </svg>
      </div>
    </div>

    <!-- Google logo watermark -->
    <div class="absolute google-logo" style="bottom: 14px; left: 88px; font-size: 13px;">
      <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
    </div>

  </div>

  <!-- Ad banner at bottom -->
  <div class="flex items-center gap-3 px-3 py-3 bg-white border-t border-gray-200">
    <!-- App icon -->
    <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0" style="background: linear-gradient(135deg, #1565c0, #42a5f5);">
      <div class="w-full h-full flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="white">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        </svg>
      </div>
    </div>
    <!-- Ad text -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-1.5 mb-0.5">
        <span class="text-xs font-semibold px-1.5 py-0.5 rounded" style="background:#f5c518; color:#555;">AD</span>
        <span class="font-bold text-gray-900 text-base">Speed Radar</span>
      </div>
      <p class="text-gray-500 text-xs leading-snug">A radar detector for police detector GPS speedometer.</p>
    </div>
    <!-- Download button -->
    <button class="px-5 py-3 rounded-full text-white text-sm font-medium flex-shrink-0" style="background: linear-gradient(135deg, #4fc3f7, #1976d2);">
      Download
    </button>
  </div>

</div>

</body>
</html>
