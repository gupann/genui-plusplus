<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .price-sup {
      font-size: 0.55em;
      vertical-align: super;
      line-height: 0;
    }
    .tab-active {
      border-bottom: 2.5px solid #f5c000;
      color: #f5c000;
    }
    .tab-inactive {
      color: #888;
      border-bottom: 2.5px solid transparent;
    }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-700" style="background:#2b2b2e;">

  <!-- App Header (yellow) -->
  <div class="flex items-center px-4 py-3" style="background:#f5c000;">
    <button class="mr-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-black" fill="none" viewBox="0 0 24 24" stroke="black" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <span class="text-black text-xl font-bold">Store Details</span>
  </div>

  <!-- Store Info Card -->
  <div class="mx-3 mt-3 rounded-xl overflow-hidden" style="background:#3a3a3e;">

    <!-- Store name row -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-600">
      <div class="flex items-center gap-2">
        <!-- Heart icon (Love's brand) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#e53e3e">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <span class="text-white font-bold text-base tracking-wide">TRAVEL STOP #807</span>
      </div>
      <div class="flex items-center gap-1 text-gray-400 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="#aaa">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        <span>83.3 mi</span>
      </div>
    </div>

    <!-- Address + Price -->
    <div class="flex items-start justify-between px-4 pt-3 pb-2">
      <div>
        <p class="text-white font-bold text-base">I-5, Exit 434/Sperry Ave</p>
        <p class="text-gray-400 text-sm">Patterson, CA</p>
      </div>
      <div class="text-right">
        <p class="text-white font-bold text-3xl leading-none">4.68<span class="price-sup text-lg">9</span></p>
        <p class="text-gray-400 text-xs mt-1">DIESEL #2</p>
      </div>
    </div>

    <!-- Amenities -->
    <div class="px-4 py-2 space-y-2">
      <div class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <span class="text-gray-300 text-sm">Arby's</span>
      </div>
      <div class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="1.6">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="text-gray-300 text-sm">Open 24/7</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="grid grid-cols-4 gap-2 px-4 py-4">
      <!-- Call -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background:#444;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#f5c000">
            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
          </svg>
        </div>
        <span style="color:#f5c000;" class="text-xs font-medium">Call</span>
      </div>
      <!-- Directions -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background:#444;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#f5c000">
            <path d="M21.71 11.29l-9-9a1 1 0 00-1.42 0l-9 9a1 1 0 000 1.42l9 9a1 1 0 001.42 0l9-9a1 1 0 000-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 011-1h5V7.5l3.5 3.5-3.5 3.5z"/>
          </svg>
        </div>
        <span style="color:#f5c000;" class="text-xs font-medium">Directions</span>
      </div>
      <!-- Info -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background:#444;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#f5c000">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </div>
        <span style="color:#f5c000;" class="text-xs font-medium">Info</span>
      </div>
      <!-- Share -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background:#444;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#f5c000">
            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
          </svg>
        </div>
        <span style="color:#f5c000;" class="text-xs font-medium">Share</span>
      </div>
    </div>
  </div>

  <!-- Fuel Section -->
  <div class="mx-3 mt-3 rounded-xl overflow-hidden" style="background:#3a3a3e;">

    <!-- Fuel header -->
    <div class="flex items-center gap-3 px-4 pt-4 pb-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="#aaa">
        <path d="M19.77 7.23l.01-.01-3.72-3.72L15 4.56l2.11 2.11c-.94.36-1.61 1.26-1.61 2.33 0 1.38 1.12 2.5 2.5 2.5.36 0 .69-.08 1-.21v7.21c0 .55-.45 1-1 1s-1-.45-1-1V14c0-1.1-.9-2-2-2h-1V5c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v16h10v-7.5h1.5v5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V9c0-.69-.28-1.32-.73-1.77zM18 10c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM8 18v-4.5H6L10 7v4.5h2L8 18z"/>
      </svg>
      <span class="text-white font-bold text-lg">Fuel</span>
    </div>

    <!-- Tabs -->
    <div class="flex px-4 border-b border-gray-600 mb-1">
      <button class="tab-active text-xs font-bold tracking-widest mr-6 pb-2 pt-1">COMMERCIAL</button>
      <button class="tab-inactive text-xs font-bold tracking-widest mr-6 pb-2 pt-1">CASUAL</button>
      <button class="tab-inactive text-xs font-bold tracking-widest pb-2 pt-1">PROPANE</button>
    </div>

    <!-- DEF row -->
    <div class="flex items-center justify-between px-4 py-4 border-b border-gray-600">
      <span class="text-white font-bold text-base">DEF</span>
      <span class="text-white font-bold text-3xl">3.98<span class="price-sup text-lg">9</span></span>
    </div>

    <!-- DIESEL #2 row -->
    <div class="flex items-start justify-between px-4 py-4 border-b border-gray-600">
      <div>
        <p class="text-white font-bold text-base">DIESEL #2</p>
        <p class="text-gray-400 text-sm">B20, ULSD</p>
      </div>
      <span class="text-white font-bold text-3xl">4.68<span class="price-sup text-lg">9</span></span>
    </div>

    <!-- Love's Pay button -->
    <div class="px-4 py-4">
      <button class="w-full py-4 rounded-xl font-bold text-black text-base" style="background:#f5c000;">
        Love's Pay
      </button>
    </div>

  </div>

</div>

</body>
</html>
