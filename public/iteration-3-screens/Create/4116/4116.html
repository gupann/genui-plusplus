<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background: #ccc;
    margin: 0;
  }

  /* ── Toolbar ── */
  .toolbar {
    background: #333;
    display: flex;
    align-items: center;
    padding: 0 8px 0 4px;
    height: 56px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 20;
    gap: 2px;
  }
  .tb-btn {
    background: none; border: none; cursor: pointer;
    padding: 10px; color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border-radius: 4px;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.08); }
  .tb-title {
    flex: 1;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    padding-left: 6px;
    letter-spacing: 0.01em;
  }

  /* ── Yellow content area ── */
  .note-area {
    background: #fafacd;
    flex: 1;
    min-height: calc(100vh - 56px);
    position: relative;
    padding: 0 0 120px;
  }

  /* ── Title input ── */
  .title-wrap {
    padding: 22px 20px 0;
    border-bottom: 1px solid #c8c890;
  }
  .title-field {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 22px;
    font-weight: 400;
    color: #222;
    font-family: 'Roboto', sans-serif;
    padding: 0 0 14px 2px;
    caret-color: #555;
    /* cursor blink line on left */
    border-left: 2px solid #555;
    padding-left: 6px;
  }
  .title-field::placeholder { color: #888; font-weight: 400; }

  /* ── Add item row ── */
  .add-item-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px 0;
    cursor: pointer;
  }
  .add-item-plus {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #444;
  }
  .add-item-label {
    font-size: 16px;
    color: #555;
    font-weight: 400;
  }

  /* ── Bottom floating action buttons ── */
  .fab-area {
    position: absolute;
    bottom: 32px;
    right: 18px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 20px;
  }
  .fab-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .fab-label {
    font-size: 14px;
    color: #444;
    font-weight: 400;
  }
  .fab-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #3a3a3a;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.28);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .fab-btn:hover { background: #555; }
</style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200"
     style="background:#fafacd;">

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <!-- Back arrow -->
    <button class="tb-btn" aria-label="Navigate up">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <span class="tb-title">Checklist</span>

    <!-- Save (floppy disk) -->
    <button class="tb-btn" aria-label="Save">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
    </button>

    <!-- More options (vertical dots) -->
    <button class="tb-btn" aria-label="More options">
      <svg width="5" height="22" viewBox="0 0 5 24" fill="#bbb">
        <circle cx="2.5" cy="3"   r="2.2"/>
        <circle cx="2.5" cy="12"  r="2.2"/>
        <circle cx="2.5" cy="21"  r="2.2"/>
      </svg>
    </button>
  </div>

  <!-- ── Note body ── -->
  <div class="note-area">

    <!-- Title field -->
    <div class="title-wrap">
      <input
        class="title-field"
        type="text"
        placeholder="Title"
        aria-label="Title"
        autocomplete="off"
      />
    </div>

    <!-- Add item -->
    <div class="add-item-row" role="button" tabindex="0" aria-label="Add item">
      <div class="add-item-plus">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
      <span class="add-item-label">Add item</span>
    </div>

    <!-- ── FABs: Add location + Add contact ── -->
    <div class="fab-area">

      <!-- Add location -->
      <div class="fab-row">
        <span class="fab-label">Add location</span>
        <button class="fab-btn" aria-label="Add location">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Add contact -->
      <div class="fab-row">
        <span class="fab-label">Add contact</span>
        <button class="fab-btn" aria-label="Add contact">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="16" y1="11" x2="22" y2="11"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

</div>
</body>
</html>
