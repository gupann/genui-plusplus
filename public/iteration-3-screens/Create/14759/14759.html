<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIF Maker-Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      background: #1a1a2e;
    }

    .app-bg {
      background: linear-gradient(160deg, #1a1a3e 0%, #0d2d3a 40%, #0a3d2e 100%);
      min-height: 100vh;
    }

    .top-dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      margin: 0 3px;
    }
    .top-dots span.active {
      background: #fff;
    }

    .card-purple {
      background: linear-gradient(135deg, #6b21a8 0%, #7c3aed 100%);
    }
    .card-purple-light {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    }
    .card-navy {
      background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%);
    }
    .card-blue-active {
      background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
    }
    .card-teal {
      background: linear-gradient(135deg, #0f4c5c 0%, #0e7490 100%);
    }
    .card-teal2 {
      background: linear-gradient(135deg, #065f46 0%, #0f766e 100%);
    }

    .circle-green { background: #166534; }
    .circle-green2 { background: #15803d; }
    .circle-green3 { background: #365314; }
    .circle-olive { background: #713f12; }
    .circle-brown { background: #7f1d1d; }
    .circle-crimson { background: #881337; }

    .btn-pill {
      border: 1.5px solid rgba(100,160,255,0.5);
      border-radius: 999px;
      color: rgba(255,255,255,0.7);
      font-size: 0.75rem;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .next-btn {
      background: #fff;
      color: #111;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      border-radius: 12px;
      padding: 14px 32px;
    }

    .icon-svg {
      width: 32px;
      height: 32px;
      opacity: 0.85;
    }
    .icon-sm {
      width: 28px;
      height: 28px;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col app-bg overflow-x-hidden max-w-md mx-auto border-x border-slate-700">

  <!-- Top Nav -->
  <div class="flex items-center justify-between px-4 pt-5 pb-2">
    <!-- Back arrow -->
    <button class="text-white opacity-70">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <!-- Title -->
    <span class="text-white font-bold tracking-widest text-base uppercase opacity-80">GIF MAKER-EDITOR</span>
    <!-- Settings -->
    <button class="text-white opacity-70">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </button>
  </div>

  <!-- Pagination Dots -->
  <div class="top-dots flex justify-center mt-1 mb-4">
    <span></span><span></span><span></span><span class="active"></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Top 2 cards: GIF Editor & Quick GIF Editor -->
  <div class="px-4 mb-1">
    <!-- Tooltip / label floated above -->
    <div class="relative">
      <div class="grid grid-cols-2 gap-3 mb-1">
        <!-- GIF Editor card -->
        <div class="card-purple rounded-2xl p-4 flex flex-col items-center justify-center" style="min-height:110px;">
          <!-- pencil/wand icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg mb-2" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.7)" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a4 4 0 01-1.414.879l-3.414.707.707-3.414A4 4 0 019 13z"/>
          </svg>
          <span class="text-white text-sm font-medium opacity-80">GIF Editor</span>
        </div>
        <!-- Quick GIF Editor card -->
        <div class="card-purple-light rounded-2xl p-4 flex flex-col items-center justify-center" style="min-height:110px;">
          <!-- magic wand dashed -->
          <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg mb-2" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="4 2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a4 4 0 01-1.414.879l-3.414.707.707-3.414A4 4 0 019 13z"/>
          </svg>
          <span class="text-white text-sm font-medium opacity-60">Quick GIF Editor</span>
        </div>
      </div>
      <!-- Floating label -->
      <div class="absolute inset-x-0 flex justify-center" style="top: 50%; transform: translateY(-50%);">
        <span class="text-white font-bold text-base px-3 py-1" style="text-shadow:0 2px 8px rgba(0,0,0,0.7);">Create GIF from Video in device</span>
      </div>
    </div>
  </div>

  <!-- Middle cards: Images→GIF / Video→GIF -->
  <div class="px-4 mt-2 grid grid-cols-2 gap-3">
    <!-- Images→GIF -->
    <div class="card-navy rounded-2xl p-4 flex flex-col items-center justify-center" style="min-height:100px;">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg mb-2" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.65)" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" fill="none"/>
        <circle cx="8.5" cy="8.5" r="1.5" stroke="rgba(255,255,255,0.65)" fill="none"/>
        <polyline points="21 15 16 10 5 21" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="text-white text-sm font-medium opacity-80">Images→GIF</span>
    </div>
    <!-- Video→GIF (active/highlighted) -->
    <div class="card-blue-active rounded-2xl p-4 flex flex-col items-center justify-center" style="min-height:100px;">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg mb-2" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.8">
        <polygon points="5 3 19 12 5 21 5 3" fill="white" opacity="0.9"/>
      </svg>
      <span class="text-white text-sm font-bold">Video→GIF</span>
    </div>
  </div>

  <!-- Camera→GIF / Screen Record→GIF -->
  <div class="px-4 mt-3 grid grid-cols-2 gap-3">
    <div class="card-teal rounded-2xl p-4 flex flex-col items-center justify-center" style="min-height:100px;">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg mb-2" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.65)" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="text-white text-sm font-medium opacity-80">Camera→GIF</span>
    </div>
    <div class="card-teal2 rounded-2xl p-4 flex flex-col items-center justify-center" style="min-height:100px;">
      <!-- REC icon -->
      <div class="flex flex-col items-center mb-2">
        <div class="border border-white border-opacity-60 rounded px-2 py-0.5 flex items-center gap-1 mb-1">
          <span class="w-2 h-2 rounded-full bg-red-400 inline-block"></span>
          <span class="text-white text-xs opacity-70 font-bold tracking-wider">REC</span>
        </div>
      </div>
      <span class="text-white text-sm font-medium opacity-80">Screen record→GIF</span>
    </div>
  </div>

  <!-- Bottom circle icons row 1 -->
  <div class="px-4 mt-4 grid grid-cols-3 gap-2">
    <!-- GIF→Video -->
    <div class="flex flex-col items-center">
      <div class="circle-green w-16 h-16 rounded-full flex items-center justify-center mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.85)" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="rgba(255,255,255,0.85)"/>
        </svg>
      </div>
      <span class="text-white text-xs opacity-75">GIF→Video</span>
    </div>
    <!-- Compress GIF -->
    <div class="flex flex-col items-center">
      <div class="circle-green2 w-16 h-16 rounded-full flex items-center justify-center mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.85)" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
        </svg>
      </div>
      <span class="text-white text-xs opacity-75">Compress GIF</span>
    </div>
    <!-- GIF→Images -->
    <div class="flex flex-col items-center">
      <div class="circle-green3 w-16 h-16 rounded-full flex items-center justify-center mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.85)" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          <rect x="4" y="4" width="7" height="7" rx="1" stroke="rgba(255,255,255,0.85)" fill="none" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="text-white text-xs opacity-75">GIF→Images</span>
    </div>
  </div>

  <!-- Bottom circle icons row 2 -->
  <div class="px-4 mt-3 grid grid-cols-3 gap-2 pb-2">
    <!-- Motion photo→GIF -->
    <div class="flex flex-col items-center">
      <div class="circle-olive w-16 h-16 rounded-full flex items-center justify-center mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.85)" stroke-width="1.8">
          <circle cx="12" cy="12" r="8" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="rgba(255,255,255,0.85)"/>
        </svg>
      </div>
      <span class="text-white text-xs opacity-75">Motion photo→GIF</span>
    </div>
    <!-- Studio -->
    <div class="flex flex-col items-center">
      <div class="circle-brown w-16 h-16 rounded-full flex items-center justify-center mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-dasharray="3 2">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="rgba(255,255,255,0.7)" fill="none"/>
          <circle cx="8.5" cy="8.5" r="2" stroke="rgba(255,255,255,0.7)" fill="none"/>
          <polyline points="21 15 16 10 5 21" stroke="rgba(255,255,255,0.7)" fill="none"/>
        </svg>
      </div>
      <span class="text-white text-xs opacity-75">Studio</span>
    </div>
    <!-- More (...) -->
    <div class="flex flex-col items-center">
      <div class="circle-crimson w-16 h-16 rounded-full flex items-center justify-center mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)">
          <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
        </svg>
      </div>
      <span class="text-white text-xs opacity-0">More</span>
    </div>
  </div>

  <!-- Bottom action row: info | AD | NEXT -->
  <div class="px-4 pb-4 mt-2 flex items-center gap-2 justify-between">
    <button class="btn-pill flex-1 justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </button>
    <button class="btn-pill flex-1 justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      </svg>
      <span class="text-xs font-bold opacity-70">AD</span>
    </button>
    <button class="next-btn flex-1 text-center">NEXT</button>
  </div>

</div>

</body>
</html>
