<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Roller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* 3D dice SVG icon */
    .dice-3d {
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.35));
    }

    /* Large die face */
    .die-face {
      background: white;
      border-radius: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.08);
      width: 240px;
      height: 240px;
      position: relative;
      display: grid;
      grid-template-areas:
        "tl . tr"
        ".  c  ."
        "bl . br";
      padding: 28px;
    }
    .pip {
      width: 38px;
      height: 38px;
      background: #333;
      border-radius: 50%;
    }
    /* Face = 2: top-left, bottom-right */
    .pip-tl { grid-area: tl; align-self: start; }
    .pip-br { grid-area: br; align-self: end; justify-self: end; }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col bg-white overflow-x-hidden max-w-md mx-auto border-x border-slate-200">

  <!-- Top bar -->
  <div class="flex items-center justify-between px-4 py-3">
    <span class="text-lg font-medium" style="color:#4db8c8;">Total: 2</span>
    <div class="flex gap-2">
      <button class="px-4 py-2 rounded text-white text-sm font-medium" style="background:#555;">Get Pro $0.99</button>
      <button class="px-4 py-2 rounded text-white text-sm font-medium" style="background:#555;">Dice Help</button>
    </div>
  </div>

  <!-- Main content: large die showing "2" -->
  <div class="flex-1 flex items-center justify-center py-6">
    <div class="die-face">
      <!-- Die face 2: one dot top-left, one dot bottom-right -->
      <div class="pip pip-tl"></div>
      <div class="pip pip-br"></div>
    </div>
  </div>

  <!-- Bottom controls bar -->
  <div class="flex" style="height: 180px;">

    <!-- Left: orange roll button with 3D dice SVG icon -->
    <button class="flex items-center justify-center" style="flex: 1.45; background: #f05a28;">
      <!-- 3D dice SVG (isometric style) -->
      <svg class="dice-3d" width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <!-- Top face -->
        <polygon points="40,8 72,24 40,40 8,24" fill="white" stroke="#ddd" stroke-width="0.5"/>
        <!-- Left face -->
        <polygon points="8,24 40,40 40,72 8,56" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
        <!-- Right face -->
        <polygon points="72,24 40,40 40,72 72,56" fill="#d0d0d0" stroke="#bbb" stroke-width="0.5"/>

        <!-- Top face pips: showing 1 (center red dot) -->
        <circle cx="40" cy="24" r="4" fill="#e53935"/>

        <!-- Left face pips: showing 3 -->
        <circle cx="20" cy="38" r="3" fill="#333"/>
        <circle cx="24" cy="48" r="3" fill="#333"/>
        <circle cx="16" cy="56" r="3" fill="#333"/>

        <!-- Right face pips: showing 5 -->
        <circle cx="56" cy="38" r="3" fill="#333"/>
        <circle cx="64" cy="38" r="3" fill="#333"/>
        <circle cx="60" cy="48" r="3" fill="#333"/>
        <circle cx="56" cy="58" r="3" fill="#333"/>
        <circle cx="64" cy="58" r="3" fill="#333"/>
      </svg>
    </button>

    <!-- Right: stacked controls -->
    <div class="flex flex-col" style="flex: 1;">
      <!-- Top row: minus and plus -->
      <div class="flex flex-1">
        <button class="flex-1 flex items-center justify-center text-3xl font-bold text-white border-r border-yellow-400" style="background:#f5c518;">−</button>
        <button class="flex-1 flex items-center justify-center text-3xl font-bold text-white" style="background:#f5c518;">+</button>
      </div>
      <!-- Bottom: blue dots/more options -->
      <button class="flex items-center justify-center gap-3" style="background:#42b0d5; height: 72px;">
        <span class="w-3 h-3 rounded-full bg-white opacity-80 inline-block"></span>
        <span class="w-3 h-3 rounded-full bg-white opacity-80 inline-block"></span>
        <span class="w-3 h-3 rounded-full bg-white opacity-80 inline-block"></span>
      </button>
    </div>

  </div>

</div>

</body>
</html>
