<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Material-style underline input */
    .material-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      padding: 16px 16px 0 16px;
      background: #f0f0f0;
    }
    .material-input-wrap .icon {
      padding-bottom: 10px;
      flex-shrink: 0;
    }
    .material-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 0;
    }
    .material-field label {
      font-size: 0.78rem;
      color: #2e7d32;
      margin-bottom: 2px;
    }
    .material-field input {
      border: none;
      border-bottom: 2px solid #2e7d32;
      background: transparent;
      outline: none;
      font-size: 1rem;
      color: #333;
      padding: 4px 0 6px 0;
      width: 100%;
    }
    .material-field input::placeholder { color: #bbb; }

    /* Password field — grey underline, no label */
    .material-field.inactive label { color: #888; }
    .material-field.inactive input { border-bottom-color: #aaa; }

    .section-gap { height: 20px; background: #f0f0f0; }
  </style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200" style="background:#f0f0f0;">

  <!-- App header -->
  <div class="flex items-center gap-4 px-4 py-3 bg-white border-b border-gray-200">
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="#444" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <span class="text-gray-500 text-xl font-light">Log In</span>
  </div>

  <!-- Email / username field (active / focused state) -->
  <div class="material-input-wrap" style="padding-bottom: 16px;">
    <div class="icon">
      <!-- Green user icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="#2e7d32">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>
    <div class="material-field">
      <label>Email, phone, or username</label>
      <input type="text" placeholder="" />
    </div>
  </div>

  <!-- Divider -->
  <div class="section-gap"></div>

  <!-- Password field (inactive state) -->
  <div class="material-input-wrap" style="padding-bottom: 16px;">
    <div class="icon">
      <!-- Grey lock icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="#999">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>
    <div class="material-field inactive">
      <input type="password" placeholder="Password" />
    </div>
  </div>

  <!-- Divider -->
  <div class="section-gap"></div>

  <!-- LOG IN button (muted/disabled state — light green) -->
  <button class="w-full py-5 font-bold tracking-widest text-white text-base" style="background:#a5d6a7; letter-spacing:0.12em;">
    LOG IN
  </button>

  <!-- Divider -->
  <div class="section-gap"></div>

  <!-- Trouble logging in card -->
  <div class="flex items-center gap-4 px-5 py-5 bg-gray-200">
    <!-- Green circle question mark -->
    <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background:#2e7d32;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="white">
        <path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
      </svg>
    </div>
    <p class="text-gray-700 text-base">
      Trouble Logging in? <span class="font-bold underline">Tap Here</span>
    </p>
  </div>

  <!-- Divider -->
  <div class="section-gap"></div>

  <!-- Advertising opt-out card -->
  <div class="flex items-start gap-4 px-5 py-5 bg-gray-200">
    <!-- Green circle info icon -->
    <div class="w-9 h-9 rounded-full border-2 flex items-center justify-center flex-shrink-0 mt-0.5" style="border-color:#2e7d32;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="#2e7d32">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
      </svg>
    </div>
    <p class="text-gray-600 text-sm leading-snug">
      Tap here to access device settings for opting-out of interest-based advertising and services
    </p>
  </div>

  <!-- Remaining space -->
  <div class="flex-1"></div>

</div>

</body>
</html>
